<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bidly.com</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="src/navigationbar.js" defer></script>
</head>
<body class="flex flex-col justify-center items-center min-h-screen gap-10 md:gap-20 lg:gap-10 bg-lightBG dark:bg-darkBG dark:text-white">

    <p class="max-w-md md:max-w-xl text-lg md:text-2xl font-libre">

    <a href="listings/index.html">
