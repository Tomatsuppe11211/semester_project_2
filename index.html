<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bidly.com</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex flex-col justify-center items-center gap-10">
    <div class="bg-[url('/images/laptop.png')] bg-cover border border-2 flex items-center justify-center h-80 lg:h-100 w-screen">
        <img src="images/bidly-logo.png" class="h-40 lg:h-50">
    </div>

    <p class="max-w-md lg:max-w-2xl text-lg lg:text-2xl font-libre">
        Welcome to bidly.com! A website for participating in 
        online auctions. Create or join auctions on listed items.
    </p>

    <button class="bg-button border hover:bg-hover hover:cursor-pointer hover:font-bold
        p-2 lg:p-4 w-30 lg:w-40 text-lg lg:text-2xl shadow-md lg:shadow-lg shadow-black" 
    >
        Start now
    </button>
</body>
</html>
