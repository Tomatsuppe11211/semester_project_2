<!DOCTYPE html>
<html lang="en">

    <title>Bidly.com</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex flex-col justify-center items-center gap-10 md:gap-20 lg:gap-10">
    <div class="bg-[url('/images/laptop.png')] bg-cover flex items-center justify-center h-60 md:h-100 lg:h-130 w-screen">
