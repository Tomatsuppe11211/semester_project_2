<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bidly.com/My Profile</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../src/navigationbar.js" defer></script>
    <script src="profile.js" defer></script>
</head>
<body class="flex min-h-screen flex-col bg-lightBG dark:bg-darkBG">
    <header class="flex flex-row items-center justify-between w-full p-2 md:p-3 border-b bg-white dark:bg-dark-header dark:text-white dark:border-b-black">
        <!--logo-->
        <img src="../images/bidly-logo.png" class="h-15 ml-10 md:h-20 cursor-pointer" id="headerLogo">

        <!--desktop navigation-->
        <nav class="hidden md:flex flex-row justify-evenly w-2xl">
            <a href="../listings/index.html" class="hover:underline hover:text-hover hover:font-bold text-lg md:text-xl">Listings</a>

            <!--Links for logged out users-->
            <a href="../login/index.html" id="desktopLoginLink" class="hover:underline hover:text-hover hover:font-bold text-lg md:text-xl">Login</a>
            <a href="../register/index.html" id="desktopRegisterLink" class="hover:underline hover:text-hover hover:font-bold text-lg md:text-xl">Register</a>
            
            <!--Sun icon-->
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor" 
                id="desktopSun"
                class="size-8 hover:text-hover cursor-pointer"
            >
                <path 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
                />
            </svg>

            <!--For logged in users-->
            <!--add icon (plus)-->
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor" 
                id="desktopPlus"
                class="hidden size-8 hover:text-hover hover:font-bold cursor-pointer"
            >
                <path 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" 
                />
            </svg>

            <!--profile icon-->
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor" 
                id="desktopProfile"
                class="hidden size-8 hover:text-hover hover:font-bold cursor-pointer"
            >
                <path 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" 
                />
            </svg>

            <!--sign out icon-->
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor"
                id="desktopDoor" 
                class="hidden size-8 hover:text-signout hover:font-bold"
            >
                <path 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" 
                />
            </svg>
        </nav>

        <!--burger menu icon-->
        <svg 
            xmlns="http://www.w3.org/2000/svg" 
            fill="none" 
            viewBox="0 0 24 24" 
            stroke-width="1.5" 
            stroke="currentColor"
            id="menuIcon" 
            class="size-10 cursor-pointer mr-10 md:hidden"
        >
            <path 
                stroke-linecap="round" 
                stroke-linejoin="round" 
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" 
            />
        </svg>
    </header>

    <!--Listing item modal-->
    <div class="hidden" id="itemModal">
        <div class="bg-white border border-black shadow-lg shadow-black w-4/5 md:w-2/3 lg:w-1/2 relative flex flex-col gap-5 items-center pb-5 overflow-y-auto max-w-[95%]">
            <!--Close button-->
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor" 
                id="closeItem"
                class="size-8 hover:text-error absolute top-3 right-5 rounded-full bg-white cursor-pointer"
            >
                <path 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    d="M6 18 18 6M6 6l12 12" 
                />
            </svg>

            <img alt="Listing item" class="bg-black h-50 md:h-70 lg:h-100 w-full" id ="itemImage">
            
            <h1 id="listingTitle" class="w-[90%] text-xl md:text-2xl lg:text-3xl">Listing item</h1>
            <p id="listingDescription" class="w-[90%] text-lg lg:text-xl">Description</p>
            <p id="timer" class="w-[90%] text-lg lg:text-xl">Time left: 0</p>
            <div id="listingHistory" class="flex flex-col w-[90%] gap-10 border"></div>

            <div class="flex flex-row w-[90%] border">
                <button id="seeHistory" class="w-1/3 p-2 border border-black cursor-pointer hover:bg-hover hover:text-white">History</button>
                <button id="editItem" class="w-1/3 p-2 border border-black cursor-pointer hover:bg-hover hover:text-white">Edit</button>
                <button id="deleteItem" class="w-1/3 p-2 border border-black cursor-pointer hover:bg-red hover:text-white">Delete</button>
            </div>
        </div>
    </div>


    <!--history modal-->
    <div class="hidden" id="historyModal">
        <div class="bg-white border border-black w-4/5 md:w-2/3 lg:w-1/2 relative p-4 flex flex-col gap-5">
            <!--Close button-->
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor" 
                id="closeHistory"
                class="size-8 hover:text-error absolute top-3 right-5 rounded-full cursor-pointer"
            >
                <path 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    d="M6 18 18 6M6 6l12 12" 
                />
            </svg>

            <!--Mini navigationbar for modal-->
            <div class="flex flex-row w-full justify-evenly mt-10">
                <h2 class="text-lg font-libre font-bold underline text-hover cursor-pointer" id="biddingsButton">Biddings</h2>
                <h2 class="text-lg font-libre font-bold hover:text-hover hover:underline cursor-pointer" id="winningsButton">Winnings</h2>
            </div>

            <!--Biddings history-->
            <div id="biddingHistory" class="flex flex-col gap-2 md:gap-5">
                <div class="flex flex-row w-full">
                    <p class="w-1/3 font-bold text-start">Name</p>
                    <p class="w-1/3 font-bold text-center">Status</p>
                    <p class="w-1/3 font-bold text-end">Current/final bid</p>
                </div>

                <!--Listings appears here-->
                <div id="biddingsOverview"></div>
            </div>

            <!--winnings History-->
            <div id="winningHistory" class="hidden">
                <div class="flex flex-row w-full">
                    <p class="w-2/3 font-bold text-start">Name</p>
                    <p class="w-1/3 font-bold text-end">Current/final bid</p>
                </div>

                <!--Listings appears here-->
                <div id="winningsOverview"></div>
            </div>
        </div>
    </div>


    <main class="flex grow flex-col relative items-center justify-center dark:text-white gap-10 md:gap-15 mb-5">
        <!--Mobile navigation-->
        <nav 
            id="mobileNav" 
            class="hidden md:hidden"
        >

            <!--Close button-->
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor" 
                id="closeBurgerMenu"
                class="size-8 hover:text-error absolute top-3 right-5 rounded-full cursor-pointer"
            >
                <path 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    d="M6 18 18 6M6 6l12 12" 
                />
            </svg>

            <!--Links-->
            <div id="mobileNavLinks" class="flex flex-col w-25 mt-20 gap-5">
                <a href="../listings/index.html" class="text-lg">Listings</a>
                <a href="../login/index.html" id="mobileLoginLink" class="text-lg">Login</a>
                <a href="../register/index.html" id="mobileRegisterLink" class="text-lg">Register</a>
                <!--Sun icon-->
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    fill="none" 
                    viewBox="0 0 24 24" 
                    stroke-width="1.5" 
                    stroke="currentColor" 
                    id="mobileSun"
                    class="size-8 hover:text-hover cursor-pointer"
                >
                    <path 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
                    />
                </svg>
                <!--add icon (plus)-->
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    fill="none" 
                    viewBox="0 0 24 24" 
                    stroke-width="1.5" 
                    stroke="currentColor" 
                    id="mobilePlus"
                    class="hidden size-8 hover:text-hover cursor-pointer"
                >
                    <path 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" 
                    />
                </svg>
                <!--profile icon-->
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    fill="none" 
                    viewBox="0 0 24 24" 
                    stroke-width="1.5" 
                    stroke="currentColor" 
                    id="mobileProfile"
                    class=" hidden size-8 hover:text-hover cursor-pointer"
                >
                    <path 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" 
                    />
                </svg>
                <!--sign out icon-->
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    fill="none" 
                    viewBox="0 0 24 24" 
                    stroke-width="1.5" 
                    stroke="currentColor" 
                    id="mobileDoor"
                    class="hidden size-8 hover:text-signout cursor-pointer"
                >
                    <path 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" 
                    />
                </svg>
            </div>
        </nav>

        <!--Banner-->
        <img 
            src="" 
            alt="Banner" 
            id="banner"
            class="border-b-black h-50 md:h-70 lg:h-150 w-full"
        >

        <!--Avatar-->
        <img
            alt="Avatar"
            id="avatar"
            class="rounded-full h-35 w-35 md:h-45 md:w-45 lg:h-70 lg:w-70 border border-black -mt-20 md:-mt-30 lg:-mt-45"
        >


        <!--Profile details-->
        <div id="profile info" class="border border-black flex flex-col items-center gap-5 py-5 bg-white dark:bg-dark-header w-[90%] sm:w-md lg:w-xl xl:w-3xl shadow-lg shadow-black">
            <h1 id="username" class="text-2xl lg:text-4xl font-bold w-full text-center"></h1>

            <!--Bio-->
            <p id="bio" class="p-2 w-[90%] md:text-xl"></p>

            <button 
                id="edit" 
                type="button" 
                class="py-1 md:py-2 px-3 md:px-4 bg-button border border-black shadow-lg shadow-black text-black hover:bg-hover hover:text-white cursor-pointer"
            >Edit profile</button>
        </div>


        <button id="historyButton" class="border border-black bg-button dark:bg-darkBG py-2 px-4 shadow-md shadow-black cursor-pointer hover:bg-hover">See history</button>


        <!--Listings display-->
        <div class="border border-black bg-white dark:bg-dark-header w-[90%] sm:w-md lg:w-xl xl:w-3xl flex flex-col gap-5 py-5 items-center shadow-lg shadow-black mb-10">
            <h1 class="text-xl lg:text-2xl font-bold w-full text-center">Your listings</h1>
            <div id="display" class="flex flex-col md:flex-row md:flex-wrap items-center justify-between w-[90%]"></div>
        </div>
    </main>

    <footer class="flex flex-col lg:flex-row items-center border-t py-5 lg:justify-evenly bg-white w-full dark:bg-dark-header dark:text-white dark:border-t-black gap-10">
        <div class="flex flex-col gap-2 text-center lg:text-start w-30">
            <h3 class="font-bold underline text-lg md:text-xl">Information</h3>
            <a href="../about/index.html" class="hover:underline hover:text-hover hover:font-bold md:text-lg">About us</a>
            <a href="../contact/index.html" class="hover:underline hover:text-hover hover:font-bold md:text-lg">Contact us</a>
        </div>

        <div class="flex flex-col gap-2 text-center lg:text-start w-30">
            <h3 class="font-bold underline text-lg md:text-xl">Policies</h3>
            <a href="../Policies/Terms of use/index.html" class="hover:underline hover:text-hover hover:font-bold md:text-lg">Terms of use</a>
            <a href="../Policies/Privacy Policy/index.html" class="hover:underline hover:text-hover hover:font-bold md:text-lg">Privacy Policy</a>
        </div>

        <img src="../images/bidly-logo.png" class="h-15 lg:h-20 cursor-pointer" id="footerLogo">
    </footer>
</body>
</html>
