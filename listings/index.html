<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bidly.com/listings</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="flex flex-row p-2 relative w-screen border-b items-center">
        <!--logo-->
        <img src="../images/bidly-logo.png" class="h-15 ml-5">

        <!--Searchbar-->
        <div class="flex flex-row items-center justify-evenly border rounded-lg h-8">
            <input 
                type="text"
                id="searchinput"
                class="w-40 focus:border-none h-full"
            >

            <div class="flex items-center justify-center border-l h-full w-10 hover:bg-hover hover:text-white hover:rounded-tr-lg hover:rounded-br-lg cursor-pointer">
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    fill="none" 
                    viewBox="0 0 24 24" 
                    stroke-width="1.5" 
                    stroke="currentColor" 
                    class="size-6"
                >
                    <path 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" 
                    />
                </svg>
            </div>
            
        </div>


        <!--desktop navigation for logged out users-->
        <nav>
            <a href="#" class="underline text-hover font-bold">Listings</a>
            <a href="#" class="hover:underline hover:text-hover hover:font-bold">Login</a>
            <a href="#" class="hover:underline hover:text-hover hover:font-bold">Register</a>
        </nav>

        <!--Desktop navigation for logged in users-->
        <nav></nav>


        <!--burger menu icon-->
        <svg 
            xmlns="http://www.w3.org/2000/svg" 
            fill="none" 
            viewBox="0 0 24 24" 
            stroke-width="1.5" 
            stroke="currentColor" 
            class="size-10 absolute right-20 cursor-pointer"
        >
            <path 
                stroke-linecap="round" 
                stroke-linejoin="round" 
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" 
            />
        </svg>

    </header>

    <h1>Hei</h1>
</body>
</html>
