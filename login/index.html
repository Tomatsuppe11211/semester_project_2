<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bidly.com/Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../src/navigationbar.js" defer></script>
    <script src="login.js" defer></script>
</head>
<body class="flex min-h-full flex-col bg-lightBG">
    <header class="flex flex-row items-center justify-between w-full p-2 md:p-3 border-b bg-white dark:bg-dark-header dark:text-white dark:border-b-black">
        <!--logo-->
        <img src="../images/bidly-logo.png" class="h-15 ml-10 md:h-20 cursor-pointer" id="headerLogo">

        <!--desktop navigation-->
        <nav class="hidden md:flex flex-row justify-evenly w-2xl">
            <a href="../listings/index.html" class="hover:underline hover:text-hover hover:font-bold text-lg md:text-xl">Listings</a>

            <!--Links for logged out users-->
            <a href="#" id="desktopLoginLink" class="hover:underline hover:text-hover hover:font-bold text-lg md:text-xl">Login</a>
            <a href="#" id="desktopRegisterLink" class="hover:underline hover:text-hover hover:font-bold text-lg md:text-xl">Register</a>
            
            <!--Sun icon-->
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor" 
                id="desktopSun"
                class="size-8 hover:text-hover cursor-pointer"
            >
                <path 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
                />
            </svg>

            <!--For logged in users-->
            <!--add icon (plus)-->
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor" 
                id="desktopPlus"
                class="hidden size-8 hover:text-hover hover:font-bold cursor-pointer"
            >
                <path 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" 
                />
            </svg>

            <!--profile icon-->
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor" 
                id="desktopProfile"
                class="hidden size-8 hover:text-hover hover:font-bold cursor-pointer"
            >
                <path 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" 
                />
            </svg>

            <!--sign out icon-->
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor"
                id="desktopDoor" 
                class="hidden size-8 hover:text-signout hover:font-bold"
            >
                <path 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" 
                />
            </svg>
        </nav>

        <!--burger menu icon-->
        <svg 
            xmlns="http://www.w3.org/2000/svg" 
            fill="none" 
            viewBox="0 0 24 24" 
            stroke-width="1.5" 
            stroke="currentColor"
            id="menuIcon" 
            class="size-10 cursor-pointer mr-10 md:hidden"
        >
            <path 
                stroke-linecap="round" 
                stroke-linejoin="round" 
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" 
            />
        </svg>
    </header>

    <main class="flex grow flex-col min-h-screen dark:bg-darkBG items-center justify-center">
        <!--Mobile navigation-->
        <nav 
            id="mobileNav" 
            class="hidden md:hidden"
        >

            <!--Close button-->
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor" 
                id="closeBurgerMenu"
                class="size-8 hover:text-error absolute top-3 right-5 rounded-full cursor-pointer"
            >
                <path 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    d="M6 18 18 6M6 6l12 12" 
                />
            </svg>

            <!--Links-->
            <div id="mobileNavLinks" class="flex flex-col w-25 mt-20 gap-5">
                <a href="../listings/index.html" class="text-lg">Listings</a>
                <a href="../login/index.html" id="mobileLoginLink" class="text-lg">Login</a>
                <a href="#" id="mobileRegisterLink" class="text-lg">Register</a>
                <!--Sun icon-->
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    fill="none" 
                    viewBox="0 0 24 24" 
                    stroke-width="1.5" 
                    stroke="currentColor" 
                    id="mobileSun"
                    class="size-8 hover:text-hover cursor-pointer"
                >
                    <path 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
                    />
                </svg>
                <!--add icon (plus)-->
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    fill="none" 
                    viewBox="0 0 24 24" 
                    stroke-width="1.5" 
                    stroke="currentColor" 
                    id="mobilePlus"
                    class="hidden size-8 hover:text-hover cursor-pointer"
                >
                    <path 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" 
                    />
                </svg>
                <!--profile icon-->
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    fill="none" 
                    viewBox="0 0 24 24" 
                    stroke-width="1.5" 
                    stroke="currentColor" 
                    id="mobileProfile"
                    class=" hidden size-8 hover:text-hover cursor-pointer"
                >
                    <path 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" 
                    />
                </svg>
                <!--sign out icon-->
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    fill="none" 
                    viewBox="0 0 24 24" 
                    stroke-width="1.5" 
                    stroke="currentColor" 
                    id="mobileDoor"
                    class="hidden size-8 hover:text-signout cursor-pointer"
                >
                    <path 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" 
                    />
                </svg>
            </div>
        </nav>

        <!--Login form-->
        <form id="loginForm" class="flex flex-col items-center justify-center border w-[90%] sm:w-md md:w-lg lg:w-xl px-2 md:px-4 py-5 rounded-md gap-5 md:gap-10 shadow-md md:shadow-lg shadow-black bg-white dark:bg-dark-header text-white">
            <h1 class="text-2xl md:text-4xl text-center font-slab">Login</h1>

            <div class="flex flex-col w-[90%] gap-2">
                <label for="emailInput" class="text-lg md:text-xl font-slab">Email</label>
                <div class="flex flex-row py-2 px-4 border items-center justify-between w-full rounded-full dark:bg-darkBG">
                    <input 
                        type="email" 
                        id="emailInput" 
                        placeholder="example@stud.noroff.no" 
                        class="px-2 w-4/5 focus:outline-none md:text-lg font-libre"
                        pattern=".+@stud.noroff.no"
                        required
                    >

                    <!--envelope icon-->
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        fill="none" 
                        viewBox="0 0 24 24" 
                        stroke-width="1.5" 
                        stroke="currentColor" 
                        class="size-6 md:size-8"
                    >
                        <path 
                            stroke-linecap="round" 
                            stroke-linejoin="round" 
                            d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" 
                        />
                    </svg>
                </div>
            </div>

            <div class="flex flex-col w-[90%] gap-2">
                <label for="passwordInput" class="text-lg md:text-xl font-slab">Password</label>
                <div class="flex flex-row py-2 px-4 border items-center justify-between w-full rounded-full dark:bg-darkBG">
                    <input 
                        type="password" 
                        id="passwordInput" 
                        placeholder="Password" 
                        class="px-2 w-4/5 focus:outline-none md:text-lg font-libre"
                        required
                    >

                    <!--lock icon-->
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        fill="none" 
                        viewBox="0 0 24 24" 
                        stroke-width="1.5" 
                        stroke="currentColor" 
                        class="size-6 md:size-8"
                    >
                        <path 
                            stroke-linecap="round" 
                            stroke-linejoin="round" 
                            d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" 
                        />
                    </svg>

                </div>
            </div>

            <button id="loginButton" class="py-2 px-4 border rounded-lg bg-button shadow-md shadow-black hover:bg-hover hover:text-white hover:border-black text-lg font-bold font-libre cursor-pointer dark:text-black dark:border-black">Login</button>
        </form>
    </main>

    <footer class="flex flex-col lg:flex-row items-center border-t gap-10 py-5 lg:justify-evenly bg-white w-full dark:bg-dark-header dark:text-white dark:border-t-black">
        <div class="flex flex-col gap-2 text-center lg:text-start w-30">
            <h3 class="font-bold underline text-lg md:text-xl">Information</h3>
            <a href="../about/index.html" class="hover:underline hover:text-hover hover:font-bold md:text-lg">About us</a>
            <a href="" class="hover:underline hover:text-hover hover:font-bold md:text-lg">Contact us</a>
        </div>

        <div class="flex flex-col gap-2 text-center lg:text-start w-30">
            <h3 class="font-bold underline text-lg md:text-xl">Policies</h3>
            <a href="" class="hover:underline hover:text-hover hover:font-bold md:text-lg">Terms of use</a>
            <a href="" class="hover:underline hover:text-hover hover:font-bold md:text-lg">Privacy Policy</a>
        </div>

        <img src="../images/bidly-logo.png" class="h-15 lg:h-20 cursor-pointer" id="footerLogo">
    </footer>
</body>
</html>
